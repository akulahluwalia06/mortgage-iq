services:
  - type: web
    name: mortgage-iq-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: mortgage_predictor
      - key: ALLOWED_ORIGINS
        value: https://akulahluwalia06.github.io
      - key: MAX_DOCS
        value: "150000"
      - key: TARGET_DOCS
        value: "100000"
      - key: RETRAIN_THRESHOLD
        value: "500"
